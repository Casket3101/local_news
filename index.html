<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ადგილობრივი ამბები</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="static/style.css">
</head>
<body class="bg-light">

    <div id="navbar-holder"></div>
    <div class="container" id="flash-container"></div>

    <main class="container py-3">
        <div class="jumbotron text-center bg-white border shadow-sm rounded p-5 mb-5">
            <h1 class="display-4 font-weight-bold text-dark">🏡 ადგილობრივი ამბები</h1>
            <p class="lead font-italic text-primary mt-2">„ადგილობრივი ამბები — ახლოს შენთან!“</p>
            <hr class="my-4">
            <p class="text-muted">პლატფორმა, სადაც ყველას შეუძლია გააზიაროს უბნის, სკოლის, კულტურისა თუ სპორტის მნიშვნელოვანი სიახლეები.</p>
            <a class="btn btn-primary btn-lg px-4" href="register.html" role="button" id="join-btn">შემოგვიერთდი</a>
        </div>

        <h3 class="mb-4 font-weight-bold text-secondary">📰 აქტუალური სიახლეები</h3>

        <div class="row" id="news-list"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="static/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const user = DB.currentUser();
            if (user) document.getElementById('join-btn').style.display = 'none';

            const approved = DB.loadNews()
                .filter(n => n.isApproved)
                .sort((a, b) => new Date(b.datePosted) - new Date(a.datePosted));

            const list = document.getElementById('news-list');
            if (approved.length === 0) {
                list.innerHTML = `
                <div class="col-12">
                    <div class="alert alert-light text-center border py-5 rounded-lg" role="alert">
                        <h5 class="text-muted mb-0">ამ დროისთვის სიახლეები არ არის. გახდით პირველი და გააზიარეთ ამბავი!</h5>
                    </div>
                </div>`;
                return;
            }

            list.innerHTML = approved.map(news => `
                <div class="col-md-6 mb-4">
                    <div class="card h-100 shadow-sm border-0 rounded-lg">
                        <div class="card-body d-flex flex-column p-4">
                            <div class="d-flex justify-content-between align-items-center mb-3">
                                <span class="badge badge-pill badge-primary px-3 py-2">${escapeHtml(news.category)}</span>
                                <small class="text-muted">📅 ${formatDate(news.datePosted)}</small>
                            </div>
                            <h4 class="card-title font-weight-bold text-dark mb-2">${escapeHtml(news.title)}</h4>
                            <p class="card-text text-secondary flex-grow-1">${escapeHtml(news.content)}</p>
                            <hr class="my-3">
                            <div class="d-flex align-items-center justify-content-between">
                                <span class="text-muted small">✍️ გამოაქვეყნა: <strong>${escapeHtml(news.authorUsername)}</strong></span>
                                ${(user && (user.username === news.authorUsername || user.username === 'Admin')) ? `<button onclick="deleteNews(${news.id})" class="btn btn-danger btn-sm font-weight-bold rounded-pill px-3 shadow-sm">🗑️ წაშლა</button>` : ''}
                            </div>
                        </div>
                    </div>
                </div>`).join('');
        });
    </script>
</body>
</html>
